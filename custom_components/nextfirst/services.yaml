create_experience:
  name: Erlebnis anlegen
  description: Legt einen neuen offenen NextFirst-Eintrag an.
  fields:
    title:
      required: true
      selector:
        text:
    description:
      required: false
      selector:
        text:
    location:
      required: false
      selector:
        text:
    offer_url:
      required: false
      selector:
        text:
    budget_per_person_eur:
      required: false
      selector:
        number:
          min: 0
          max: 500
          mode: box
    location:
      required: false
      selector:
        text:
    offer_url:
      required: false
      selector:
        text:

update_experience:
  name: Erlebnis bearbeiten
  description: Aktualisiert Felder eines bestehenden Eintrags.
  fields:
    experience_id:
      required: true
      selector:
        text:
    budget_per_person_eur:
      required: false
      selector:
        number:
          min: 0
          max: 500
          mode: box

delete_experience:
  name: Erlebnis löschen
  description: Löscht einen Eintrag anhand seiner ID.
  fields:
    experience_id:
      required: true
      selector:
        text:

mark_skipped:
  name: Als übersprungen markieren
  description: Setzt den Status auf übersprungen.
  fields:
    experience_id:
      required: true
      selector:
        text:

reactivate_experience:
  name: Reaktivieren
  description: Setzt einen übersprungenen/archivierten Eintrag zurück auf offen.
  fields:
    experience_id:
      required: true
      selector:
        text:

mark_experienced:
  name: Als erlebt markieren
  description: Setzt den Status auf erlebt und ergänzt optional Abschlussdaten.
  fields:
    experience_id:
      required: true
      selector:
        text:

attach_media:
  name: Bildreferenz anhängen
  description: Verknüpft einen Medienpfad mit einem Erlebnis.
  fields:
    experience_id:
      required: true
      selector:
        text:
    path:
      required: true
      selector:
        text:

add_note:
  name: Notiz hinzufügen
  description: Setzt oder ersetzt die Notiz eines Eintrags.
  fields:
    experience_id:
      required: true
      selector:
        text:
    note:
      required: true
      selector:
        text:

generate_ai_suggestions:
  name: KI-Vorschläge erzeugen
  description: Erzeugt neue Vorschläge via konfiguriertem KI-Provider.

get_statistics:
  name: Statistiken abrufen
  description: Gibt NextFirst-Metriken als Service-Response zurück.

get_album:
  name: Album abrufen
  description: Gibt die letzten erlebten Einträge als Albumliste zurück.

get_share_history:
  name: Share Historie abrufen
  description: Gibt die letzten Social-Share-Events als Response zurück.
  fields:
    limit:
      required: false
      selector:
        number:
          min: 1
          max: 200
          mode: box

preview_monthly_summary:
  name: Monatszusammenfassung Vorschau
  description: Erzeugt eine Monatszusammenfassung als Textvorschau.
  fields:
    month:
      required: false
      description: Monat im Format YYYY-MM (optional, Standard ist aktueller Monat).
      selector:
        text:

share_experience:
  name: Erlebnis teilen
  description: Erzeugt Share-Links für manuelles Teilen (z. B. Instagram/X/Facebook/WhatsApp/Telegram).
  fields:
    experience_id:
      required: true
      selector:
        text:
    text:
      required: false
      selector:
        text:
    hashtags:
      required: false
      description: Kommagetrennte Liste.
      selector:
        text:

share_monthly_summary:
  name: Monatszusammenfassung teilen
  description: Erzeugt Share-Links für den Monatsrückblick zum manuellen Teilen.
  fields:
    month:
      required: false
      selector:
        text:
    text:
      required: false
      selector:
        text:
    hashtags:
      required: false
      description: Kommagetrennte Liste.
      selector:
        text:
